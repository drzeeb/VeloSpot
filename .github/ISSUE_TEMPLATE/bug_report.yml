name: 🐛 Bug report
description: Report a problem or unexpected behaviour in VeloSpot
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! 🚲
        Please fill out the form below as completely as possible so we can reproduce and fix the issue.
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checklist
      options:
        - label: I have searched the [existing issues](https://github.com/drzeeb/VeloSpot/issues) and this has not been reported yet.
          required: true
        - label: I am running the latest available version of VeloSpot.
          required: true
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the problem?
      placeholder: |
        1. Go to '...'
        2. Tap on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or screen recording
      description: If applicable, add screenshots or a recording to help explain the problem.
    validations:
      required: false
  - type: input
    id: app-version
    attributes:
      label: App version
      description: Found under the in-app menu / About, or the release tag.
      placeholder: e.g. v1.0.19
    validations:
      required: true
  - type: dropdown
    id: flavour
    attributes:
      label: App flavour / install source
      options:
        - Google Play
        - F-Droid
        - GitHub release APK
        - Built from source
        - Not sure
    validations:
      required: true
  - type: input
    id: android-version
    attributes:
      label: Android version
      placeholder: e.g. Android 14
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device model
      placeholder: e.g. Google Pixel 7
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any relevant logcat output here. This will be automatically formatted into code, so no need for backticks.
      render: shell
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context about the problem here.
    validations:
      required: false

