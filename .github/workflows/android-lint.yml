name: Android Lint

# Runs Android Lint against the canonical F-Droid debug build and uploads the
# HTML/XML report as a build artifact. Catches resource, performance and
# potential-leak issues early.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Android Lint (fdroid debug)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Run Android Lint
        run: ./gradlew :app:lintFdroidDebug --no-daemon

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: android-lint-report
          path: |
            app/build/reports/lint-results-fdroidDebug.html
            app/build/reports/lint-results-fdroidDebug.xml
          if-no-files-found: warn

