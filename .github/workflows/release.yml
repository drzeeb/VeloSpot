name: Release

# Triggered when a tag in the format vX.Y.Z is pushed,
# or manually via "Run workflow" with any tag.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag (e.g. v1.0.8)"
        required: true
        default: "v1.0.0"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Build & Release (F-Droid + Google Play)
    # Do not re-run when the security-release workflow pushed the tag itself.
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # ── Compute version from Git tag ──────────────────────────────────────────
      # Format: vX.Y.Z  →  versionName = X.Y.Z  |  versionCode = X*10000 + Y*100 + Z
      # Examples:  v1.0.0 → 10000  |  v1.0.8 → 10008  |  v1.2.3 → 10203
      - name: Extract version from tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag_name }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          VERSION="${TAG#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          PATCH=${PATCH:-0}
          VERSION_CODE=$(( MAJOR * 10000 + MINOR * 100 + PATCH ))
          echo "tag=$TAG"                        >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"                >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE"      >> "$GITHUB_OUTPUT"
          echo "VERSION_NAME=$VERSION"           >> "$GITHUB_ENV"
          echo "VERSION_CODE=$VERSION_CODE"      >> "$GITHUB_ENV"

      # ── JDK ───────────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      # ── Decode keystore from secret ───────────────────────────────────────────
      # Required GitHub secrets (set once under Settings → Secrets → Actions):
      #   KEYSTORE_BASE64   – base64-encoded content of the .jks file
      #   STORE_PASSWORD    – keystore password
      #   KEY_ALIAS         – signing key alias
      #   KEY_PASSWORD      – key password
      #
      # Generate the secret value (one-time, locally):
      #   macOS/Linux:  base64 -i release.jks | tr -d '\n'
      #   Windows:      [Convert]::ToBase64String([IO.File]::ReadAllBytes("release.jks"))
      - name: Decode release keystore
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /tmp/release.jks
          echo "KEYSTORE_PATH=/tmp/release.jks"          >> "$GITHUB_ENV"
          echo "STORE_PASSWORD=${{ secrets.STORE_PASSWORD }}" >> "$GITHUB_ENV"
          echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}"          >> "$GITHUB_ENV"
          echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}"    >> "$GITHUB_ENV"

      # ── Bump static version literals so F-Droid can parse them ────────────────
      # F-Droid's fdroidserver uses a STATIC regex parser and cannot evaluate
      # Kotlin expressions. We rewrite the literals to match the pushed tag, so the
      # commit the tag ends up pointing to always contains the correct values.
      - name: Set versionCode / versionName in build.gradle.kts
        run: |
          sed -i -E "s/versionCode = [0-9]+/versionCode = ${VERSION_CODE}/" app/build.gradle.kts
          sed -i -E "s/versionName = \"[^\"]*\"/versionName = \"${VERSION_NAME}\"/" app/build.gradle.kts
          echo "----- resolved version literals -----"
          grep -nE "versionCode = |versionName = " app/build.gradle.kts

      # ── Promote the Unreleased changelog section to this release ──────────────
      # The GitHub release notes and the F-Droid changelog are extracted from a
      # "## [vX.Y.Z] — DATE" heading. We rewrite the "## [Unreleased]" heading in
      # place so the released commit/tag carries a proper, dated version section
      # (same format as older releases: tag, an em dash "—", then the UTC date).
      # If no [Unreleased] section exists (e.g. it was renamed manually), this is
      # a no-op and the existing CHANGELOG.md is left untouched.
      - name: Promote Unreleased changelog section to this version
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          DATE="$(date -u +%Y-%m-%d)"
          EMDASH="$(printf '\u2014')"
          if grep -q "^## \[Unreleased\]" CHANGELOG.md; then
            sed -i -E "s|^## \[Unreleased\].*$|## [${TAG}] ${EMDASH} ${DATE}|" CHANGELOG.md
            echo "Promoted [Unreleased] -> [${TAG}] ${EMDASH} ${DATE}"
          else
            echo "No [Unreleased] section found; CHANGELOG.md left unchanged"
          fi
          echo "----- top changelog headings -----"
          grep -nE "^## \[" CHANGELOG.md | head -n 5

      # ── Build APKs ────────────────────────────────────────────────────────────
      - name: Build F-Droid & Google Play Release APKs
        run: |
          ./gradlew assembleFdroidRelease assembleGooglePlayRelease --no-daemon

      # ── Rename APKs ───────────────────────────────────────────────────────────
      - name: Rename APKs
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          mv app/build/outputs/apk/fdroid/release/app-fdroid-release.apk \
             "app/build/outputs/apk/fdroid/release/VeloSpot-${TAG}-fdroid.apk"
          mv app/build/outputs/apk/googlePlay/release/app-googlePlay-release.apk \
             "app/build/outputs/apk/googlePlay/release/VeloSpot-${TAG}-googlePlay.apk"

      # ── Extract changelog section for this release ────────────────────────────
      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NOTES=$(awk "/^## \[v?${VERSION}\]/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)"
          fi
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # ── Create GitHub Release ─────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "VeloSpot ${{ steps.version.outputs.tag }}"
          body: |
            ## VeloSpot ${{ steps.version.outputs.tag }}

            ${{ steps.changelog.outputs.notes }}

            ---

            ### 📥 APK Variants

            | File | Description |
            |---|---|
            | `VeloSpot-${{ steps.version.outputs.tag }}-fdroid.apk` | **F-Droid flavor** – no Google services, ready to sideload |
            | `VeloSpot-${{ steps.version.outputs.tag }}-googlePlay.apk` | **Google Play flavor** – includes Google Play Services Location |

            ### Installation (sideload)
            1. Download the APK below.
            2. On your Android device: **Settings → Apps → Install unknown apps** → allow your browser or file manager.
            3. Open the APK and tap **Install**.

            > The **F-Droid flavor** is also available on [F-Droid](https://f-droid.org/packages/de.velospot/).
          files: |
            app/build/outputs/apk/fdroid/release/VeloSpot-${{ steps.version.outputs.tag }}-fdroid.apk
            app/build/outputs/apk/googlePlay/release/VeloSpot-${{ steps.version.outputs.tag }}-googlePlay.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Create F-Droid changelog file ─────────────────────────────────────────
      # fastlane/metadata/android/*/changelogs/<versionCode>.txt is read by F-Droid
      # as release notes for this version.
      - name: Create F-Droid changelog files
        run: |
          VERSION_CODE="${{ steps.version.outputs.version_code }}"
          VERSION="${{ steps.version.outputs.version }}"
          NOTES=$(awk "/^## \[v?${VERSION}\]/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md | head -20)
          if [ -z "$NOTES" ]; then NOTES="VeloSpot ${VERSION}"; fi
          echo "$NOTES" > "fastlane/metadata/android/de-DE/changelogs/${VERSION_CODE}.txt"
          echo "$NOTES" > "fastlane/metadata/android/en-US/changelogs/${VERSION_CODE}.txt"

      - name: Commit version bump + F-Droid changelog and move tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/build.gradle.kts
          git add CHANGELOG.md
          git add fastlane/metadata/android/*/changelogs/
          git diff --staged --quiet || \
            git commit -m "chore: release ${{ steps.version.outputs.tag }} — bump version, promote changelog, F-Droid notes"
          # Move the release tag to this commit so F-Droid reads the correct static values.
          git tag -f "${{ steps.version.outputs.tag }}" HEAD
          git push --force origin "${{ steps.version.outputs.tag }}"
          git push origin HEAD:main || true
