name: Release

# Triggered when a tag in the format vX.Y.Z is pushed,
# or manually via "Run workflow" with any tag.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag (e.g. v1.0.8)"
        required: true
        default: "v1.0.0"

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Build & Release (F-Droid + Google Play)
    # Do not re-run when the security-release workflow pushed the tag itself.
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # BRouter is compiled from the pinned `brouter-upstream` submodule, so
          # it must be checked out for assembleFdroidRelease to build.
          submodules: recursive

      # ── Compute version from Git tag ──────────────────────────────────────────
      # Format: vX.Y.Z  →  versionName = X.Y.Z  |  versionCode = X*10000 + Y*100 + Z
      # Examples:  v1.0.0 → 10000  |  v1.0.8 → 10008  |  v1.2.3 → 10203
      - name: Extract version from tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag_name }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          VERSION="${TAG#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          PATCH=${PATCH:-0}
          VERSION_CODE=$(( MAJOR * 10000 + MINOR * 100 + PATCH ))
          echo "tag=$TAG"                        >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"                >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE"      >> "$GITHUB_OUTPUT"
          echo "VERSION_NAME=$VERSION"           >> "$GITHUB_ENV"
          echo "VERSION_CODE=$VERSION_CODE"      >> "$GITHUB_ENV"

      # ── JDK ───────────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      # ── Decode keystore from secret ───────────────────────────────────────────
      # Required GitHub secrets (set once under Settings → Secrets → Actions):
      #   KEYSTORE_BASE64    – base64-encoded content of the .jks file
      #   KEYSTORE_PASSWORD  – keystore password
      #   KEY_ALIAS          – signing key alias
      #   KEY_PASSWORD       – key password
      #
      # Generate the KEYSTORE_BASE64 value (one-time, locally):
      #   macOS/Linux:  base64 -i release.jks | tr -d '\n'
      #   Windows:      [Convert]::ToBase64String([IO.File]::ReadAllBytes("release.jks"))
      - name: Decode release keystore
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /tmp/release.jks
          echo "KEYSTORE_PATH=/tmp/release.jks"                    >> "$GITHUB_ENV"
          echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> "$GITHUB_ENV"
          echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}"                 >> "$GITHUB_ENV"
          echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}"           >> "$GITHUB_ENV"

      # ── Bump static version literals so F-Droid can parse them ────────────────
      # F-Droid's fdroidserver uses a STATIC regex parser and cannot evaluate
      # Kotlin expressions. We rewrite the literals to match the pushed tag, so the
      # commit the tag ends up pointing to always contains the correct values.
      - name: Set versionCode / versionName in build.gradle.kts
        run: |
          sed -i -E "s/versionCode = [0-9]+/versionCode = ${VERSION_CODE}/" app/build.gradle.kts
          sed -i -E "s/versionName = \"[^\"]*\"/versionName = \"${VERSION_NAME}\"/" app/build.gradle.kts
          echo "----- resolved version literals -----"
          grep -nE "versionCode = |versionName = " app/build.gradle.kts

      # ── Build APKs ────────────────────────────────────────────────────────────
      - name: Build F-Droid & Google Play Release APKs
        run: |
          ./gradlew assembleFdroidRelease assembleGooglePlayRelease --no-daemon

      # ── Rename APKs ───────────────────────────────────────────────────────────
      # The F-Droid APK uses the EXACT stable name required by the fdroiddata
      # "Binaries" URL:  https://github.com/drzeeb/VeloSpot/releases/download/v%v/VeloSpot-v%v.apk
      # i.e. VeloSpot-v<versionName>.apk  (TAG already equals v<versionName>).
      - name: Rename APKs
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          mv app/build/outputs/apk/fdroid/release/app-fdroid-release.apk \
             "app/build/outputs/apk/fdroid/release/VeloSpot-${TAG}.apk"
          mv app/build/outputs/apk/googlePlay/release/app-googlePlay-release.apk \
             "app/build/outputs/apk/googlePlay/release/VeloSpot-${TAG}-googlePlay.apk"

      # ── Promote the [Unreleased] changelog section ────────────────────────────
      # Turns "## [Unreleased]" into "## [vX.Y.Z] — <date>" and inserts a fresh,
      # empty "## [Unreleased]" section above it. Idempotent: if a heading for
      # this version already exists (e.g. promoted manually), it does nothing.
      - name: Promote [Unreleased] changelog section
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DATE=$(date -u +%Y-%m-%d)
          if grep -qE "^## \[v?${VERSION}\]" CHANGELOG.md; then
            echo "Heading for ${VERSION} already present – skipping promotion."
          elif grep -q '^## \[Unreleased\]' CHANGELOG.md; then
            awk -v ver="$VERSION" -v date="$DATE" '
              !done && /^## \[Unreleased\]/ {
                print "## [Unreleased]";
                print "";
                print "---";
                print "";
                print "## [v" ver "] — " date;
                done=1;
                next
              }
              { print }
            ' CHANGELOG.md > CHANGELOG.tmp && mv CHANGELOG.tmp CHANGELOG.md
            echo "Promoted [Unreleased] → [v${VERSION}] — ${DATE}"
          else
            echo "No [Unreleased] section found – skipping promotion."
          fi

      # ── Extract changelog section for this release ────────────────────────────
      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NOTES=$(awk "/^## \[v?${VERSION}\]/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)"
          fi
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # ── Create GitHub Release ─────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "VeloSpot ${{ steps.version.outputs.tag }}"
          body: |
            ## VeloSpot ${{ steps.version.outputs.tag }}

            ${{ steps.changelog.outputs.notes }}

            ---

            ### 📥 APK Variants

            | File | Description |
            |---|---|
            | `VeloSpot-${{ steps.version.outputs.tag }}.apk` | **F-Droid flavor** – no Google services, ready to sideload; this is the APK F-Droid reproducibly verifies |
            | `VeloSpot-${{ steps.version.outputs.tag }}-googlePlay.apk` | **Google Play flavor** – includes Google Play Services Location |

            ### Installation (sideload)
            1. Download the APK below.
            2. On your Android device: **Settings → Apps → Install unknown apps** → allow your browser or file manager.
            3. Open the APK and tap **Install**.

            > The **F-Droid flavor** is also available on [F-Droid](https://f-droid.org/packages/de.velospot/).
          files: |
            app/build/outputs/apk/fdroid/release/VeloSpot-${{ steps.version.outputs.tag }}.apk
            app/build/outputs/apk/googlePlay/release/VeloSpot-${{ steps.version.outputs.tag }}-googlePlay.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Create F-Droid changelog file ─────────────────────────────────────────
      # fastlane/metadata/android/*/changelogs/<versionCode>.txt is read by F-Droid
      # as release notes for this version.
      - name: Create F-Droid changelog files
        run: |
          VERSION_CODE="${{ steps.version.outputs.version_code }}"
          VERSION="${{ steps.version.outputs.version }}"
          NOTES=$(awk "/^## \[v?${VERSION}\]/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md | head -20)
          if [ -z "$NOTES" ]; then NOTES="VeloSpot ${VERSION}"; fi
          echo "$NOTES" > "fastlane/metadata/android/de-DE/changelogs/${VERSION_CODE}.txt"
          echo "$NOTES" > "fastlane/metadata/android/en-US/changelogs/${VERSION_CODE}.txt"

      - name: Commit version bump + changelog, move tag, open sync PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/build.gradle.kts
          git add CHANGELOG.md
          git add fastlane/metadata/android/*/changelogs/

          if git diff --staged --quiet; then
            echo "No changes to commit – moving tag only."
            git tag -f "$TAG" HEAD
            git push --force origin "$TAG"
            exit 0
          fi

          git commit -m "chore: bump versionCode/versionName + promote changelog for ${TAG}"

          # Move the release tag to this commit so F-Droid reads the correct static
          # values and the GitHub Release ships the promoted changelog. Tags are not
          # covered by the branch protection ruleset, so this always succeeds.
          git tag -f "$TAG" HEAD
          git push --force origin "$TAG"

          # `main` is protected (ruleset "main-protection-strict": PR + review
          # required, no bypass actors). A direct push from the bot is rejected, so
          # instead we push the commit to a dedicated branch and open a PR to bring
          # the promoted changelog / version bump back into `main`.
          BRANCH="release/${TAG}"
          git push --force origin "HEAD:refs/heads/${BRANCH}"
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore: release ${TAG} — changelog & version bump" \
            --body "Automated release sync for **${TAG}**: promotes the \`[Unreleased]\` changelog section to \`${TAG}\` (with today's date) and bumps \`versionCode\`/\`versionName\`. Merge to keep \`main\` in sync with the release tag." \
            || echo "PR already exists for ${BRANCH} – skipping."
