name: Release

# Triggered when a tag in the format vX.Y.Z is pushed,
# or manually via "Run workflow" with any tag.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag (e.g. v1.0.8)"
        required: true
        default: "v1.0.0"

permissions:
  contents: write
  # Required to generate signed build-provenance attestations (SLSA) via the
  # Sigstore public-good infrastructure.
  id-token: write
  attestations: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Build & Release (F-Droid + Google Play)
    # Do not re-run when the security-release workflow pushed the tag itself.
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          # BRouter is compiled from the pinned `brouter-upstream` submodule, so
          # it must be checked out for assembleFdroidRelease to build.
          submodules: recursive

      # ── Compute version from Git tag ──────────────────────────────────────────
      # Format: vX.Y.Z  →  versionName = X.Y.Z  |  versionCode = X*10000 + Y*100 + Z
      # Examples:  v1.0.0 → 10000  |  v1.0.8 → 10008  |  v1.2.3 → 10203
      - name: Extract version from tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag_name }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          VERSION="${TAG#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          PATCH=${PATCH:-0}
          VERSION_CODE=$(( MAJOR * 10000 + MINOR * 100 + PATCH ))
          echo "tag=$TAG"                        >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"                >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE"      >> "$GITHUB_OUTPUT"
          echo "VERSION_NAME=$VERSION"           >> "$GITHUB_ENV"
          echo "VERSION_CODE=$VERSION_CODE"      >> "$GITHUB_ENV"

      # ── JDK ───────────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      # ── Decode keystore from secret ───────────────────────────────────────────
      # Required GitHub secrets (set once under Settings → Secrets → Actions):
      #   KEYSTORE_BASE64    – base64-encoded content of the .jks file
      #   KEYSTORE_PASSWORD  – keystore password
      #   KEY_ALIAS          – signing key alias
      #   KEY_PASSWORD       – key password
      #
      # Generate the KEYSTORE_BASE64 value (one-time, locally):
      #   macOS/Linux:  base64 -i release.jks | tr -d '\n'
      #   Windows:      [Convert]::ToBase64String([IO.File]::ReadAllBytes("release.jks"))
      - name: Decode release keystore
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /tmp/release.jks
          echo "KEYSTORE_PATH=/tmp/release.jks"                    >> "$GITHUB_ENV"
          echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> "$GITHUB_ENV"
          echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}"                 >> "$GITHUB_ENV"
          echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}"           >> "$GITHUB_ENV"

      # ── Verify the tagged commit already carries the correct version ─────────
      # Release process (see docs/RELEASING.md): the contributor bumps
      # versionCode/versionName AND promotes the CHANGELOG [Unreleased] section
      # to "## [vX.Y.Z] — <date>" IN THE RELEASE PR, *before* tagging. This
      # workflow only builds & publishes — it never rewrites files, never moves
      # the tag and never opens a sync PR. Fail fast if the static literals do not
      # match the tag, so a forgotten bump can't ship a mislabelled APK.
      - name: Verify version literals match the tag
        run: |
          ACTUAL_CODE=$(grep -oE "versionCode = [0-9]+" app/build.gradle.kts | grep -oE "[0-9]+")
          ACTUAL_NAME=$(grep -oE 'versionName = "[^"]*"' app/build.gradle.kts | sed -E 's/.*"([^"]*)".*/\1/')
          echo "tag → ${VERSION_NAME} / ${VERSION_CODE}   build.gradle.kts → ${ACTUAL_NAME} / ${ACTUAL_CODE}"
          if [ "$ACTUAL_CODE" != "$VERSION_CODE" ] || [ "$ACTUAL_NAME" != "$VERSION_NAME" ]; then
            echo "::error::app/build.gradle.kts is at ${ACTUAL_NAME}/${ACTUAL_CODE} but tag ${{ steps.version.outputs.tag }} expects ${VERSION_NAME}/${VERSION_CODE}. Bump the version in your release PR BEFORE tagging (see docs/RELEASING.md)."
            exit 1
          fi
          if ! grep -qE "^## \[v?${VERSION_NAME//./\\.}\]" CHANGELOG.md; then
            echo "::warning::No '## [v${VERSION_NAME}]' heading found in CHANGELOG.md — promote the [Unreleased] section in your release PR before tagging."
          fi

      # ── Build APKs ────────────────────────────────────────────────────────────
      - name: Build F-Droid & Google Play Release APKs
        run: |
          ./gradlew assembleFdroidRelease assembleGooglePlayRelease --no-daemon

      # ── Rename APKs ───────────────────────────────────────────────────────────
      # The F-Droid APK uses the EXACT stable name required by the fdroiddata
      # "Binaries" URL:  https://github.com/drzeeb/VeloSpot/releases/download/v%v/VeloSpot-v%v.apk
      # i.e. VeloSpot-v<versionName>.apk  (TAG already equals v<versionName>).
      - name: Rename APKs
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          mv app/build/outputs/apk/fdroid/release/app-fdroid-release.apk \
             "app/build/outputs/apk/fdroid/release/VeloSpot-${TAG}.apk"
          mv app/build/outputs/apk/googlePlay/release/app-googlePlay-release.apk \
             "app/build/outputs/apk/googlePlay/release/VeloSpot-${TAG}-googlePlay.apk"

      # ── SBOM (CycloneDX) ──────────────────────────────────────────────────────
      # Produce a Software Bill of Materials aggregating every module's runtime
      # dependencies (with versions + licenses) for supply-chain transparency.
      - name: Generate SBOM (CycloneDX)
        run: ./gradlew cyclonedxBom --no-daemon

      - name: Rename SBOM
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          cp build/reports/bom.json "VeloSpot-${TAG}-sbom.cdx.json"
          cp build/reports/bom.xml  "VeloSpot-${TAG}-sbom.cdx.xml"

      # ── Build provenance (SLSA / Sigstore attestations) ───────────────────────
      # Generate cryptographically verifiable provenance for the release APKs and
      # the SBOM. Consumers can verify with:  gh attestation verify <file> --repo <repo>
      - name: Attest APK build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            app/build/outputs/apk/fdroid/release/VeloSpot-${{ steps.version.outputs.tag }}.apk
            app/build/outputs/apk/googlePlay/release/VeloSpot-${{ steps.version.outputs.tag }}-googlePlay.apk

      - name: Attest SBOM provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            VeloSpot-${{ steps.version.outputs.tag }}-sbom.cdx.json
            VeloSpot-${{ steps.version.outputs.tag }}-sbom.cdx.xml

      # ── Extract changelog section for this release ────────────────────────────
      # Reads the "## [vX.Y.Z]" section that the release PR already promoted.
      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NOTES=$(awk "/^## \[v?${VERSION}\]/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)"
          fi
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # ── Create GitHub Release ─────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "VeloSpot ${{ steps.version.outputs.tag }}"
          body: |
            ## VeloSpot ${{ steps.version.outputs.tag }}

            ${{ steps.changelog.outputs.notes }}

            ---

            ### 📥 APK Variants

            | File | Description |
            |---|---|
            | `VeloSpot-${{ steps.version.outputs.tag }}.apk` | **F-Droid flavor** – no Google services, ready to sideload; this is the APK F-Droid reproducibly verifies |
            | `VeloSpot-${{ steps.version.outputs.tag }}-googlePlay.apk` | **Google Play flavor** – includes Google Play Services Location |
            | `VeloSpot-${{ steps.version.outputs.tag }}-sbom.cdx.json` / `.xml` | **CycloneDX SBOM** – full dependency + license inventory |

            ### 🔐 Supply-chain verification

            All release artifacts ship with signed [build provenance attestations](https://docs.github.com/actions/security-guides/using-artifact-attestations).
            Verify any downloaded file with the GitHub CLI:

            ```bash
            gh attestation verify VeloSpot-${{ steps.version.outputs.tag }}.apk --repo ${{ github.repository }}
            ```

            ### Installation (sideload)
            1. Download the APK below.
            2. On your Android device: **Settings → Apps → Install unknown apps** → allow your browser or file manager.
            3. Open the APK and tap **Install**.

            > The **F-Droid flavor** is also available on [F-Droid](https://f-droid.org/packages/de.velospot/).
          files: |
            app/build/outputs/apk/fdroid/release/VeloSpot-${{ steps.version.outputs.tag }}.apk
            app/build/outputs/apk/googlePlay/release/VeloSpot-${{ steps.version.outputs.tag }}-googlePlay.apk
            VeloSpot-${{ steps.version.outputs.tag }}-sbom.cdx.json
            VeloSpot-${{ steps.version.outputs.tag }}-sbom.cdx.xml
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

