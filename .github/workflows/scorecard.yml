# OpenSSF Scorecard — automated supply-chain / security posture analysis.
# Runs the checks documented at https://securityscorecards.dev, uploads the
# results to the GitHub code-scanning dashboard (Security tab) and publishes
# them to the public OpenSSF API so the README badge can render the score.
name: Scorecard

on:
  # Weekly scheduled run keeps the score fresh even without pushes.
  schedule:
    - cron: "27 4 * * 1"
  # Re-evaluate branch-protection & workflow findings on every push to main.
  push:
    branches: [main]
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# Least-privilege by default; individual permissions are granted in the job.
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Needed to upload the results to the code-scanning dashboard.
      security-events: write
      # Needed to publish results and get a badge (OIDC token).
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Publish results to OpenSSF so the README badge works and the score
          # is publicly verifiable. Safe for public repositories.
          publish_results: true

      # Upload the raw SARIF as a workflow artifact (retained 5 days) so the
      # detailed findings can be inspected even outside the Security tab.
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      # Surface the findings in the repository's Security → Code scanning tab.
      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif

