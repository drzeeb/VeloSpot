name: Gradle Wrapper Validation

# Verifies the checksum of gradle/wrapper/gradle-wrapper.jar against the list of
# official Gradle releases. Protects against a tampered/malicious wrapper JAR
# being smuggled into the repo (supply-chain hardening). Especially relevant
# because F-Droid also scans this binary.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    name: Validate Gradle wrapper
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate wrapper checksum
        uses: gradle/actions/wrapper-validation@v6

