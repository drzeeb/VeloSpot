name: CodeQL

# Static security analysis for the Kotlin/Java sources. Runs on every PR and push
# to main, plus a weekly scheduled scan. Results appear under the repo's
# Security → Code scanning tab.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 3 * * 1" # Mondays 03:27 UTC

permissions:
  contents: read
  security-events: write
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  analyze:
    name: Analyze (java-kotlin)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java-kotlin
          # security-and-quality adds maintainability/leak queries on top of the
          # default security-extended set.
          queries: security-and-quality

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      # Build the canonical open-source flavor so CodeQL can trace the bytecode.
      - name: Build F-Droid debug
        run: ./gradlew :app:assembleFdroidDebug --no-daemon

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:java-kotlin"

