name: CodeQL

# ⚠️ DISABLED for automatic runs.
# CodeQL's Kotlin extractor does not yet support Kotlin 2.4.x (it rejects
# versions >= 2.3.30 during a compiler-based build), and `build-mode: none`
# does not extract Kotlin sources ("no source code seen during build").
# Since this project is essentially pure Kotlin, no CodeQL mode currently works.
# This workflow therefore only runs on manual dispatch. Re-enable the
# push / pull_request / schedule triggers below once CodeQL gains Kotlin 2.4
# support, then this build-based config will work as-is.
on:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  analyze:
    name: Analyze (java-kotlin)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java-kotlin
          queries: security-and-quality

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Build F-Droid debug
        run: ./gradlew :app:assembleFdroidDebug --no-daemon

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:java-kotlin"
