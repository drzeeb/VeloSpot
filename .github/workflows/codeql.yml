name: CodeQL

# Static security analysis for the Kotlin/Java sources. Runs on every PR and push
# to main, plus a weekly scheduled scan. Results appear under the repo's
# Security → Code scanning tab.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 3 * * 1" # Mondays 03:27 UTC

permissions:
  contents: read
  security-events: write
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  analyze:
    name: Analyze (java-kotlin)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java-kotlin
          # build-mode: none extracts the sources directly without invoking the
          # Kotlin compiler. This avoids the "Kotlin version 2.4.0 is too recent"
          # extractor error (CodeQL's Kotlin support lags behind the latest
          # releases) and removes the need for a JDK/Gradle build step.
          build-mode: none
          # security-and-quality adds maintainability/leak queries on top of the
          # default security-extended set.
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:java-kotlin"
