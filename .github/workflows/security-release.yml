name: Auto-release after Renovate security fix

# Triggers when a Renovate security PR is merged into main.
# Computes the next patch version, builds the APK, and publishes a GitHub Release.
on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  security-release:
    name: Bump patch version and publish security APK
    # Only run for merged Renovate bot security PRs from this repository.
    if: |
      github.event.pull_request.merged == true &&
      github.event.pull_request.user.login == 'renovate[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      startsWith(github.event.pull_request.head.ref, 'renovate/') &&
      contains(github.event.pull_request.labels.*.name, 'security')

    runs-on: ubuntu-latest


    steps:
      - name: Checkout repository (full history for tag detection)
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # ── Compute next patch version ──────────────────────────────────────────
      - name: Compute next patch tag
        id: tag
        run: |
          LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $LATEST"
          VERSION="${LATEST#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "New tag: $NEW_TAG"
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"

      # ── Build APK ───────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Build debug APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK with version tag
        run: |
          mv app/build/outputs/apk/debug/app-debug.apk \
             "app/build/outputs/apk/debug/VeloSpot-${{ steps.tag.outputs.new_tag }}-debug.apk"

      # ── Push tag ─────────────────────────────────────────────────────────────
      # The tag is pushed before the release so that the release points to the
      # correct ref. We use the built-in GITHUB_TOKEN; the release.yml workflow
      # guards against duplicate releases by checking if a release already exists.
      - name: Push new version tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.tag.outputs.new_tag }}" -m "Security patch ${{ steps.tag.outputs.new_tag }}"
          git push origin "${{ steps.tag.outputs.new_tag }}"

      # ── Create GitHub Release ────────────────────────────────────────────────
      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: "VeloSpot ${{ steps.tag.outputs.new_tag }} — security patch"
          body: |
            ## 🔒 Security Patch Release

            This release was created automatically after Renovate merged a security fix.

            **Merged PR:** ${{ github.event.pull_request.title }}
            **PR:** #${{ github.event.pull_request.number }}

            ### Installation
            1. Download the APK below.
            2. **Settings → Install unknown apps** → allow your file manager or browser.
            3. Open the APK and tap **Install**.

            > This is a debug build — release signing is not yet configured.

            For the full change history see [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md).
          files: app/build/outputs/apk/debug/VeloSpot-${{ steps.tag.outputs.new_tag }}-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

