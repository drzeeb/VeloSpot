name: Auto-release prep after Renovate security fix

# Triggers when a Renovate security PR is merged into main.
# It does NOT build/tag/publish directly — the F-Droid static-literal model
# requires the version bump to live in the *tagged* commit, so an unattended bot
# release would not be reproducible. Instead it opens a release-prep PR that bumps
# the version, promotes the changelog and adds fastlane notes (exactly like a
# manual release PR). Once that PR is merged and the tag is pushed, `release.yml`
# builds, signs and publishes.
on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  security-release-prep:
    name: Open release-prep PR for security patch
    if: |
      github.event.pull_request.merged == true &&
      github.event.pull_request.user.login == 'renovate[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      startsWith(github.event.pull_request.head.ref, 'renovate/') &&
      contains(github.event.pull_request.labels.*.name, 'security')

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository (full history for tag detection)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # ── Compute next patch version ────────────────────────────────────────────
      # Expects tags in the format vX.Y.Z; increments Z by 1.
      # versionCode formula: X*10000 + Y*100 + Z  (e.g. v1.0.9 → 10009)
      - name: Compute next patch version
        id: ver
        run: |
          LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
          echo "Latest tag: $LATEST"
          VERSION="${LATEST#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          PATCH=${PATCH:-0}
          NEW_PATCH=$(( PATCH + 1 ))
          NEW_TAG="v${MAJOR}.${MINOR}.${NEW_PATCH}"
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
          NEW_CODE=$(( MAJOR * 10000 + MINOR * 100 + NEW_PATCH ))
          DATE=$(date -u +%Y-%m-%d)
          echo "new_tag=$NEW_TAG"          >> "$GITHUB_OUTPUT"
          echo "new_version=$NEW_VERSION"  >> "$GITHUB_OUTPUT"
          echo "new_code=$NEW_CODE"        >> "$GITHUB_OUTPUT"
          echo "date=$DATE"                >> "$GITHUB_OUTPUT"
          echo "Next release: $NEW_TAG  (versionCode: $NEW_CODE)"

      # ── Prepare the release content ───────────────────────────────────────────
      # Bumps the static version literals (F-Droid reads them via regex), promotes
      # the [Unreleased] changelog section and writes the fastlane "What's New".
      - name: Bump version, promote changelog, write fastlane notes
        run: |
          NEW_VERSION="${{ steps.ver.outputs.new_version }}"
          NEW_CODE="${{ steps.ver.outputs.new_code }}"
          DATE="${{ steps.ver.outputs.date }}"

          sed -i -E "s/versionCode = [0-9]+/versionCode = ${NEW_CODE}/" app/build.gradle.kts
          sed -i -E "s/versionName = \"[^\"]*\"/versionName = \"${NEW_VERSION}\"/" app/build.gradle.kts

          # Promote [Unreleased] → [vX.Y.Z] — <date>; idempotent.
          if ! grep -qE "^## \[v?${NEW_VERSION//./\\.}\]" CHANGELOG.md && grep -q '^## \[Unreleased\]' CHANGELOG.md; then
            awk -v ver="$NEW_VERSION" -v date="$DATE" '
              !done && /^## \[Unreleased\]/ {
                print "## [Unreleased]"; print ""; print "---"; print "";
                print "## [v" ver "] — " date; done=1; next
              }
              { print }
            ' CHANGELOG.md > CHANGELOG.tmp && mv CHANGELOG.tmp CHANGELOG.md
          fi

          # fastlane "What's New": this version's changelog body (fallback: PR title).
          NOTES=$(awk "/^## \[v?${NEW_VERSION}\]/{f=1;next} f&&/^## /{exit} f{print}" CHANGELOG.md | sed '/^$/d' | head -20)
          if [ -z "$NOTES" ]; then NOTES="- Security dependency update (${{ github.event.pull_request.title }})."; fi
          echo "$NOTES" > "fastlane/metadata/android/de-DE/changelogs/${NEW_CODE}.txt"
          echo "$NOTES" > "fastlane/metadata/android/en-US/changelogs/${NEW_CODE}.txt"

      # ── Open the release-prep PR ──────────────────────────────────────────────
      - name: Open release-prep PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_TAG="${{ steps.ver.outputs.new_tag }}"
          BRANCH="release-prep/${NEW_TAG}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add app/build.gradle.kts CHANGELOG.md fastlane/metadata/android/*/changelogs/
          if git diff --staged --quiet; then
            echo "Nothing to prepare – skipping PR."
            exit 0
          fi
          git commit -m "release: prepare ${NEW_TAG} (security patch)"
          git push --force origin "$BRANCH"
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "release: prepare ${NEW_TAG} (security patch)" \
            --body "Automated release prep after Renovate security fix #${{ github.event.pull_request.number }} (**${{ github.event.pull_request.title }}**). Bumps versionCode/versionName to ${NEW_TAG}, promotes the changelog and adds fastlane notes. Review & merge, then tag ${NEW_TAG} on the merge commit so release.yml builds & publishes VeloSpot-${NEW_TAG}.apk." \
            || echo "PR already exists for ${BRANCH} – skipping."
