name: Auto-release after Renovate security fix

# Triggers when a Renovate security PR is merged into main.
# Computes the next patch version, builds both flavor APKs, and publishes a GitHub Release.
on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  security-release:
    name: Bump patch version and publish security APK
    if: |
      github.event.pull_request.merged == true &&
      github.event.pull_request.user.login == 'renovate[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      startsWith(github.event.pull_request.head.ref, 'renovate/') &&
      contains(github.event.pull_request.labels.*.name, 'security')

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository (full history for tag detection)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # BRouter is compiled from the pinned `brouter-upstream` submodule.
          submodules: recursive

      # ── Compute next patch tag ────────────────────────────────────────────────
      # Expects tags in the format vX.Y.Z; increments Z by 1.
      # versionCode formula: X*10000 + Y*100 + Z  (e.g. v1.0.9 → 10009)
      - name: Compute next patch tag and version code
        id: tag
        run: |
          LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
          echo "Latest tag: $LATEST"
          VERSION="${LATEST#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          PATCH=${PATCH:-0}
          NEW_PATCH=$(( PATCH + 1 ))
          NEW_TAG="v${MAJOR}.${MINOR}.${NEW_PATCH}"
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
          NEW_VERSION_CODE=$(( MAJOR * 10000 + MINOR * 100 + NEW_PATCH ))
          echo "new_tag=$NEW_TAG"                         >> "$GITHUB_OUTPUT"
          echo "new_version=$NEW_VERSION"                 >> "$GITHUB_OUTPUT"
          echo "new_version_code=$NEW_VERSION_CODE"       >> "$GITHUB_OUTPUT"
          echo "VERSION_NAME=$NEW_VERSION"                >> "$GITHUB_ENV"
          echo "VERSION_CODE=$NEW_VERSION_CODE"           >> "$GITHUB_ENV"
          echo "New tag: $NEW_TAG  (versionCode: $NEW_VERSION_CODE)"

      # ── JDK ───────────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      # ── Decode keystore (optional) ────────────────────────────────────────────
      - name: Decode release keystore
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /tmp/release.jks
          echo "KEYSTORE_PATH=/tmp/release.jks"                    >> "$GITHUB_ENV"
          echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> "$GITHUB_ENV"
          echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}"                 >> "$GITHUB_ENV"
          echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}"           >> "$GITHUB_ENV"

      # ── Build APKs ────────────────────────────────────────────────────────────
      - name: Build F-Droid & Google Play Release APKs
        run: |
          chmod +x gradlew
          ./gradlew assembleFdroidRelease assembleGooglePlayRelease \
            -PversionName="${VERSION_NAME}" \
            -PversionCode="${VERSION_CODE}" \
            --no-daemon

      # ── Rename APKs ───────────────────────────────────────────────────────────
      # F-Droid APK uses the stable name required by the fdroiddata Binaries URL.
      - name: Rename APKs
        run: |
          TAG="${{ steps.tag.outputs.new_tag }}"
          mv app/build/outputs/apk/fdroid/release/app-fdroid-release.apk \
             "app/build/outputs/apk/fdroid/release/VeloSpot-${TAG}.apk"
          mv app/build/outputs/apk/googlePlay/release/app-googlePlay-release.apk \
             "app/build/outputs/apk/googlePlay/release/VeloSpot-${TAG}-googlePlay.apk"

      # ── Push Git tag ──────────────────────────────────────────────────────────
      - name: Push new version tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.tag.outputs.new_tag }}" \
            -m "Security patch ${{ steps.tag.outputs.new_tag }}"
          git push origin "${{ steps.tag.outputs.new_tag }}"

      # ── Create GitHub Release ─────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: "VeloSpot ${{ steps.tag.outputs.new_tag }} — security patch"
          body: |
            ## 🔒 Security Patch Release

            This release was created automatically after Renovate merged a security fix.

            **Merged PR:** ${{ github.event.pull_request.title }}
            **PR:** #${{ github.event.pull_request.number }}

            ---

            ### 📥 APK Variants

            | File | Description |
            |---|---|
            | `VeloSpot-${{ steps.tag.outputs.new_tag }}.apk` | **F-Droid flavor** – no Google services |
            | `VeloSpot-${{ steps.tag.outputs.new_tag }}-googlePlay.apk` | **Google Play flavor** |

            ### Installation (sideload)
            1. Download the APK below.
            2. On your Android device: **Settings → Apps → Install unknown apps** → allow your file manager or browser.
            3. Open the APK and tap **Install**.

            For the full change history see [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md).
          files: |
            app/build/outputs/apk/fdroid/release/VeloSpot-${{ steps.tag.outputs.new_tag }}.apk
            app/build/outputs/apk/googlePlay/release/VeloSpot-${{ steps.tag.outputs.new_tag }}-googlePlay.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
