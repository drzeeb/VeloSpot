name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  actions: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci-build:
    name: ci-build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      # Use the F-Droid flavor as the canonical CI build (no GMS required).
      # The Google Play flavor is built separately in the release workflow.
      - name: Assemble F-Droid debug
        run: ./gradlew :app:assembleFdroidDebug --no-daemon

      - name: Upload F-Droid debug APK
        uses: actions/upload-artifact@v7
        with:
          name: app-fdroid-debug-apk
          path: app/build/outputs/apk/fdroid/debug/*.apk
          if-no-files-found: error

  ci-test:
    name: ci-test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew :app:testFdroidDebugUnitTest --no-daemon
