name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  actions: write
  # Allow the coverage step to post/update a summary comment on pull requests.
  pull-requests: write
  # Required for Codecov's tokenless (OIDC) upload.
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci-build:
    name: ci-build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      # Use the F-Droid flavor as the canonical CI build (no GMS required).
      # The Google Play flavor is built separately in the release workflow.
      - name: Assemble F-Droid debug
        run: ./gradlew :app:assembleFdroidDebug --no-daemon

      - name: Upload F-Droid debug APK
        uses: actions/upload-artifact@v7
        with:
          name: app-fdroid-debug-apk
          path: app/build/outputs/apk/fdroid/debug/*.apk
          if-no-files-found: error

  ci-test:
    name: ci-test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew :app:testFdroidDebugUnitTest --no-daemon

      # ── Coverage (Kover) ──────────────────────────────────────────────────────
      # Generate a JaCoCo-compatible XML report from the F-Droid debug unit tests.
      - name: Generate coverage report
        run: ./gradlew :app:koverXmlReportFdroid --no-daemon

      # Post/update a coverage summary comment on the pull request.
      - name: Add coverage comment to PR
        if: github.event_name == 'pull_request'
        uses: madrapps/jacoco-report@v1.7.1
        with:
          paths: ${{ github.workspace }}/app/build/reports/kover/reportFdroid.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: "🧪 Test coverage"
          update-comment: true

      # Upload to Codecov for the trend graph + README badge (tokenless OIDC
      # upload works for public repositories).
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: app/build/reports/kover/reportFdroid.xml
          flags: unittests
          fail_ci_if_error: false
          use_oidc: true

      # Keep the raw report as a downloadable artifact.
      - name: Upload coverage report artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: app/build/reports/kover/reportFdroid.xml
          if-no-files-found: warn

